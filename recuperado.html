<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perdilost - Confirmar recuperación</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }

    .contenedor {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #1f2d3d;
    }

    .bloque-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      padding: 18px 20px;
      border-radius: 14px;
      margin-top: 18px;
      line-height: 1.6;
    }

    .codigo {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      color: #1f2937;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1>Confirmar recuperación</h1>

    <div class="bloque-info">
      En esta página podrás confirmar si finalmente has recuperado tu objeto.
    </div>

<div class="codigo" id="codigo-recuperacion">
  Código: no informado
</div>

<div style="margin-top: 24px;">
  <p style="font-weight: bold; color: #1f2937; margin-bottom: 12px;">¿Has recuperado tu objeto?</p>

  <label style="display:block; margin-bottom:10px; color:#334155;">
    <input type="radio" name="recuperado" value="si">
    Sí, ya lo he recuperado
  </label>

  <label style="display:block; margin-bottom:10px; color:#334155;">
    <input type="radio" name="recuperado" value="no">
    No, todavía no lo he recuperado
  </label>
</div>
    <div style="margin-top: 24px;">
  <p style="font-weight: bold; color: #1f2937; margin-bottom: 12px;">Comentarios (opcional)</p>
  <textarea id="recovery-comments" placeholder="Puedes añadir aquí cualquier comentario sobre la recuperación del objeto" style="width:100%; max-width:100%; min-height:120px; padding:12px; border:1px solid #cbd5e1; border-radius:10px; box-sizing:border-box; font-size:14px;"></textarea>
</div>
    <div style="margin-top: 24px;">
  <button type="button" id="btn-enviar-recuperacion" style="background:#2563eb; color:white; border:none; padding:12px 18px; border-radius:10px; cursor:pointer;">
    Enviar confirmación
  </button>
</div>

<div id="mensaje-recuperacion" style="margin-top:20px;"></div>
  </div>
  
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
<script>
  const supabaseUrl = 'https://ihpwcqkmqdlmowqkjamq.supabase.co';
  const supabaseKey = 'sb_publishable_xc-mlrcfwRNy394u97Hg3Q_RQvxGe5M';
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    document.getElementById('codigo-recuperacion').textContent = 'Código: ' + code;
  }

document.getElementById('btn-enviar-recuperacion').addEventListener('click', async function () {
  const opcionSeleccionada = document.querySelector('input[name="recuperado"]:checked');
  const comentarios = document.getElementById('recovery-comments').value.trim();
  const mensaje = document.getElementById('mensaje-recuperacion');

  if (!opcionSeleccionada) {
    mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-weight:bold;">Debes indicar si has recuperado tu objeto.</div>';
    return;
  }

  const recuperado = opcionSeleccionada.value === 'si';

  const datosActualizar = {
    is_recovered: recuperado,
    recovery_comments: comentarios || null
  };

  if (recuperado) {
    datosActualizar.recovered_at = new Date().toISOString();
  } else {
    datosActualizar.recovered_at = null;
  }

  const { error } = await supabaseClient
    .from('items')
    .update(datosActualizar)
    .eq('code', code);

  if (error) {
    mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-weight:bold;">Error al guardar la confirmación: ' + error.message + '</div>';
    return;
  }

  mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#dcfce7; color:#166534; border:1px solid #86efac; font-weight:bold;">Confirmación guardada correctamente.</div>';
});
</script>
</body>
</html>
