<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perdilost - Confirmar recuperación</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      margin: 0;
      padding: 0;
    }

    .contenedor {
      max-width: 700px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      color: #1f2d3d;
    }

    .bloque-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
      padding: 18px 20px;
      border-radius: 14px;
      margin-top: 18px;
      line-height: 1.6;
    }

    .codigo {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 12px;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      color: #1f2937;
      font-weight: bold;
    }

    .campo-error {
      border-color: #dc2626 !important;
      background: #fef2f2 !important;
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.12);
    }

    .grupo-error {
      padding: 10px 12px;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      background: #fef2f2;
    }

    .grupo-error #pregunta-recuperacion,
    .grupo-error label {
      color: #991b1b !important;
    }

    .grupo-error input[type="radio"] {
      accent-color: #dc2626;
    }
  </style>
</head>
<body>
  <div class="contenedor">
    <h1 id="titulo-recuperacion">Confirmar recuperación</h1>
    <div style="display:flex; justify-content:flex-end; gap:8px; margin-bottom:16px;">
      <button type="button" onclick="cambiarIdioma('es')" id="btn-es" style="background:#2563eb; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">ES</button>
      <button type="button" onclick="cambiarIdioma('en')" id="btn-en" style="background:#2563eb; color:white; border:none; padding:8px 12px; border-radius:8px; cursor:pointer;">EN</button>
    </div>

    <div class="bloque-info" id="texto-info-recuperacion">
      En esta página podrás confirmar si finalmente has recuperado tu objeto.
    </div>

    <div class="codigo" id="codigo-recuperacion">
      Código: no informado
    </div>
    <div class="codigo" id="descripcion-recuperacion" style="font-weight: normal;">
      Descripción: no informada
    </div>

    <div id="grupo-recuperado" style="margin-top: 24px;">
      <p id="pregunta-recuperacion" style="font-weight: bold; color: #1f2937; margin-bottom: 12px;">¿Has recuperado ya el objeto (o has quedado con la persona para recuperarlo próximamente)?</p>

      <label id="label-recuperado-si" style="display:block; margin-bottom:10px; color:#334155;">
        <input type="radio" name="recuperado" value="si">
        Sí, ya lo he recuperado
      </label>

      <label id="label-recuperado-no" style="display:block; margin-bottom:10px; color:#334155;">
        <input type="radio" name="recuperado" value="no">
        No, todavía no lo he recuperado
      </label>
    </div>

    <div style="margin-top: 24px;">
      <p id="titulo-comentarios" style="font-weight: bold; color: #1f2937; margin-bottom: 12px;">Comentarios (opcional)</p>
      <textarea id="recovery-comments" placeholder="Puedes añadir aquí cualquier comentario sobre la recuperación del objeto" style="width:100%; max-width:100%; min-height:120px; padding:12px; border:1px solid #cbd5e1; border-radius:10px; box-sizing:border-box; font-size:14px;"></textarea>
    </div>

    <div style="margin-top: 24px;">
      <button type="button" id="btn-enviar-recuperacion" style="background:#2563eb; color:white; border:none; padding:12px 18px; border-radius:10px; cursor:pointer;">
        Enviar confirmación
      </button>
    </div>

    <div id="mensaje-recuperacion" style="margin-top:20px;"></div>
  </div>
  
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  let code = null;
  let idiomaActual = 'es';
  let codigoValidoRecuperacion = false;

  const textos = {
    es: {
      titulo: 'Confirmar recuperación',
      info: 'En esta página podrás confirmar si finalmente has recuperado tu objeto.',
      codigoNoInformado: 'Cargando datos...',
      descripcionNoInformada: 'Estamos comprobando la información del objeto.',
      pregunta: '¿Has recuperado ya el objeto (o has quedado con la persona para recuperarlo próximamente)?',
      opcionSi: 'Sí, ya lo he recuperado',
      opcionNo: 'No, todavía no lo he recuperado',
      comentarios: 'Comentarios (opcional)',
      placeholderComentarios: 'Puedes añadir aquí cualquier comentario sobre la recuperación del objeto',
      boton: 'Enviar confirmación',
      botonEnviando: 'Enviando...',
      errorFaltaOpcion: 'Debes indicar si has recuperado tu objeto.',
      errorGuardar: 'Error al guardar la confirmación: ',
      errorCodigoNoInformado: 'Código no informado.',
      errorCodigoNoValido: 'No se ha encontrado un objeto asociado a este código.',
      okGuardar: 'Confirmación guardada correctamente.',
      codigoLabel: 'Código: ',
      descripcionLabel: 'Descripción: '
    },
    en: {
      titulo: 'Confirm recovery',
      info: 'On this page you can confirm whether you have finally recovered your item.',
      codigoNoInformado: 'Loading data...',
      descripcionNoInformada: 'We are checking the item information.',
      pregunta: 'Have you already recovered the item (or arranged to recover it soon)?',
      opcionSi: 'Yes, I have already recovered it',
      opcionNo: 'No, I have not recovered it yet',
      comentarios: 'Comments (optional)',
      placeholderComentarios: 'You can add here any comments about the recovery of the item',
      boton: 'Send confirmation',
      botonEnviando: 'Sending...',
      errorFaltaOpcion: 'You must indicate whether you have recovered your item.',
      errorGuardar: 'Error saving the confirmation: ',
      errorCodigoNoInformado: 'Code not provided.',
      errorCodigoNoValido: 'No item was found for this code.',
      okGuardar: 'Confirmation saved correctly.',
      codigoLabel: 'Code: ',
      descripcionLabel: 'Description: '
    }
  };

  function marcarGrupoError(id) {
    const elemento = document.getElementById(id);
    if (elemento) {
      elemento.classList.add('grupo-error');
    }
  }

  function limpiarGrupoError(id) {
    const elemento = document.getElementById(id);
    if (elemento) {
      elemento.classList.remove('grupo-error');
    }
  }

  function aplicarTextosRecuperacion() {
    document.getElementById('titulo-recuperacion').textContent = textos[idiomaActual].titulo;
    document.getElementById('texto-info-recuperacion').textContent = textos[idiomaActual].info;
    document.getElementById('pregunta-recuperacion').textContent = textos[idiomaActual].pregunta;
    document.getElementById('label-recuperado-si').lastChild.textContent = ' ' + textos[idiomaActual].opcionSi;
    document.getElementById('label-recuperado-no').lastChild.textContent = ' ' + textos[idiomaActual].opcionNo;
    document.getElementById('titulo-comentarios').textContent = textos[idiomaActual].comentarios;
    document.getElementById('recovery-comments').placeholder = textos[idiomaActual].placeholderComentarios;
    document.getElementById('btn-enviar-recuperacion').textContent = textos[idiomaActual].boton;

    if (!code) {
      document.getElementById('codigo-recuperacion').textContent = textos[idiomaActual].codigoNoInformado;
      document.getElementById('descripcion-recuperacion').textContent = textos[idiomaActual].descripcionNoInformada;
    }
  }

  function cambiarIdioma(idioma) {
    idiomaActual = idioma;
    aplicarTextosRecuperacion();

    if (code) {
      document.getElementById('codigo-recuperacion').textContent = textos[idiomaActual].codigoLabel + code;

      if (!codigoValidoRecuperacion) {
        document.getElementById('descripcion-recuperacion').textContent =
          textos[idiomaActual].descripcionLabel + textos[idiomaActual].errorCodigoNoValido;
      } else {
        const descripcionActual = document.getElementById('descripcion-recuperacion').textContent
          .replace(/^Descripción:\s*/, '')
          .replace(/^Description:\s*/, '');

        document.getElementById('descripcion-recuperacion').textContent =
          textos[idiomaActual].descripcionLabel + descripcionActual;
      }
    } else if (!codigoValidoRecuperacion && token) {
      document.getElementById('descripcion-recuperacion').textContent =
        textos[idiomaActual].descripcionLabel + textos[idiomaActual].errorCodigoNoValido;
    }
  }

  async function cargarDatosRecuperacion() {
    if (token) {
      code = null;

      try {
        const respuestaToken = await fetch(`/api/resolve-recovery-token?token=${encodeURIComponent(token)}&language=${encodeURIComponent(idiomaActual)}`);
        let resultadoToken = null;

        try {
          resultadoToken = await respuestaToken.json();
        } catch (e) {
          resultadoToken = null;
        }

        if (!respuestaToken.ok || !resultadoToken?.ok || !resultadoToken.code) {
          codigoValidoRecuperacion = false;
          document.getElementById('codigo-recuperacion').textContent = textos[idiomaActual].codigoNoInformado;
          document.getElementById('descripcion-recuperacion').textContent =
            textos[idiomaActual].descripcionLabel + (resultadoToken?.error || textos[idiomaActual].errorCodigoNoValido);
          return;
        }

        code = resultadoToken.code;
      } catch (e) {
        codigoValidoRecuperacion = false;
        document.getElementById('codigo-recuperacion').textContent = textos[idiomaActual].codigoNoInformado;
        document.getElementById('descripcion-recuperacion').textContent =
          textos[idiomaActual].descripcionLabel + textos[idiomaActual].errorCodigoNoValido;
        return;
      }
    }

    if (code) {
      document.getElementById('codigo-recuperacion').textContent = textos[idiomaActual].codigoLabel + code;

      fetch(`/api/get-recovery-item?code=${encodeURIComponent(code)}&language=${encodeURIComponent(idiomaActual)}`)
        .then(async (response) => {
          let resultado = null;

          try {
            resultado = await response.json();
          } catch (e) {
            resultado = null;
          }

          if (!response.ok || !resultado?.ok) {
            codigoValidoRecuperacion = false;
            document.getElementById('descripcion-recuperacion').textContent =
              textos[idiomaActual].descripcionLabel + textos[idiomaActual].errorCodigoNoValido;
            return;
          }

          codigoValidoRecuperacion = true;

          if (resultado.preferred_language) {
            idiomaActual = resultado.preferred_language === 'en' ? 'en' : 'es';
            aplicarTextosRecuperacion();
          }

          const descripcionTexto = resultado.description || '';
          const descripcionFallback = idiomaActual === 'en' ? 'not provided' : 'no informada';

          document.getElementById('codigo-recuperacion').textContent = textos[idiomaActual].codigoLabel + code;
          document.getElementById('descripcion-recuperacion').textContent =
            textos[idiomaActual].descripcionLabel + (descripcionTexto || descripcionFallback);
        })
        .catch(() => {
          codigoValidoRecuperacion = false;
          document.getElementById('descripcion-recuperacion').textContent =
            textos[idiomaActual].descripcionLabel + textos[idiomaActual].errorCodigoNoValido;
        });
    }
  }

  cargarDatosRecuperacion();

  document.getElementById('btn-enviar-recuperacion').addEventListener('click', async function () {
    const opcionSeleccionada = document.querySelector('input[name="recuperado"]:checked');
    const comentarios = document.getElementById('recovery-comments').value.trim();
  const mensaje = document.getElementById('mensaje-recuperacion');
  const botonEnviar = document.getElementById('btn-enviar-recuperacion');

  limpiarGrupoError('grupo-recuperado');

  if (botonEnviar) {
    botonEnviar.disabled = true;
    botonEnviar.textContent = textos[idiomaActual].botonEnviando;
  }

    if (!opcionSeleccionada) {
      marcarGrupoError('grupo-recuperado');
      mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-weight:bold;">' + textos[idiomaActual].errorFaltaOpcion + '</div>';
      if (botonEnviar) {
        botonEnviar.disabled = false;
        botonEnviar.textContent = textos[idiomaActual].boton;
      }
      return;
    }

if (!code) {
  mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-weight:bold;">' + textos[idiomaActual].errorGuardar + textos[idiomaActual].errorCodigoNoInformado + '</div>';
  if (botonEnviar) {
    botonEnviar.disabled = false;
    botonEnviar.textContent = textos[idiomaActual].boton;
  }
  return;
}

if (!codigoValidoRecuperacion) {
  mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-weight:bold;">' + textos[idiomaActual].errorGuardar + textos[idiomaActual].errorCodigoNoValido + '</div>';
  if (botonEnviar) {
    botonEnviar.disabled = false;
    botonEnviar.textContent = textos[idiomaActual].boton;
  }
  return;
}

    const recuperado = opcionSeleccionada.value === 'si';

    const respuesta = await fetch('/api/confirm-recovery', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        code,
        recovered: recuperado,
        comments: comentarios,
        language: idiomaActual
      })
    });

    let resultado = null;

    try {
      resultado = await respuesta.json();
    } catch (e) {
      resultado = null;
    }

  if (!respuesta.ok) {
    const textoError = resultado?.error || textos[idiomaActual].errorGuardar;
    mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#fee2e2; color:#991b1b; border:1px solid #fca5a5; font-weight:bold;">' + textoError + '</div>';
    if (botonEnviar) {
      botonEnviar.disabled = false;
      botonEnviar.textContent = textos[idiomaActual].boton;
    }
    return;
  }

    limpiarGrupoError('grupo-recuperado');
  mensaje.innerHTML = '<div style="padding:14px 16px; border-radius:12px; background:#dcfce7; color:#166534; border:1px solid #86efac; font-weight:bold;">' + (resultado?.message || textos[idiomaActual].okGuardar) + '</div>';
  if (botonEnviar) {
    botonEnviar.textContent = textos[idiomaActual].boton;
    botonEnviar.disabled = true;
  }
  });
</script>
</body>
</html>
