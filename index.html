<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perdilost</title>
  <style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    margin: 0;
    padding: 0;
  }

  .contenedor {
    max-width: 700px;
    margin: 60px auto;
    background: white;
    padding: 30px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
  }

  h1 {
    margin-top: 0;
    color: #1f2d3d;
  }

  p {
    color: #444;
  }

button {
  background: #2563eb;
  color: white;
  border: none;
  padding: 12px 18px;
  border-radius: 10px;
  cursor: pointer;
  margin-top: 10px;
}

.botones-principales {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 20px;
}

  button:hover {
    background: #1d4ed8;
  }

  input, textarea {
    width: 100%;
    max-width: 100%;
    padding: 12px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    box-sizing: border-box;
    font-size: 14px;
  }

  textarea {
    min-height: 100px;
    resize: vertical;
  }

#zona {
  margin-top: 30px;
}

.tarjeta-formulario {
  background: #f8fafc;
  padding: 20px;
  border: 1px solid #e5e7eb;
  border-radius: 14px;
}

.tarjeta-formulario h2 {
  margin-top: 0;
  color: #1f2d3d;
}
#mensaje {
  margin-top: 20px;
}

.mensaje-ok,
.mensaje-error {
  padding: 14px 16px;
  border-radius: 12px;
  margin-top: 20px;
  font-weight: bold;
}

.mensaje-ok {
  background: #dcfce7;
  color: #166534;
  border: 1px solid #86efac;
}

.mensaje-error {
  background: #fee2e2;
  color: #991b1b;
  border: 1px solid #fca5a5;
}
</style>
</head>
<body>
  <div class="contenedor">
    <h1>Perdilost</h1>
    <p>Selecciona una opción:</p>

<div class="botones-principales">
  <button onclick="mostrarPropietario()">Tengo un código</button>
  <button onclick="mostrarEncontrado()">He encontrado un objeto</button>
</div>

    <div id="mensaje"></div>
    <div id="zona"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = 'https://ihpwcqkmqdlmowqkjamq.supabase.co';
    const supabaseKey = 'sb_publishable_xc-mlrcfwRNy394u97Hg3Q_RQvxGe5M';
    const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
    function mostrarMensaje(texto, tipo) {
  const mensaje = document.getElementById('mensaje');

  if (tipo === 'ok') {
    mensaje.innerHTML = `<div class="mensaje-ok">${texto}</div>`;
  } else {
    mensaje.innerHTML = `<div class="mensaje-error">${texto}</div>`;
  }
}
    function mostrarPropietario() {
      document.getElementById('zona').innerHTML = `
        <div class="tarjeta-formulario">
        <h2>Registrar mi código</h2>
        <p>Introduce tu código y tus datos de contacto.</p>

        <input type="text" id="codigo" placeholder="Código"><br><br>
        <input type="text" id="nombre" placeholder="Tu nombre"><br><br>
        <input type="email" id="contacto" placeholder="Tu email"><br><br>
        <textarea id="descripcion" placeholder="Descripción opcional del objeto"></textarea><br><br>

        <button onclick="guardarCodigo()">Guardar</button>
        </div>
      `;
    }

    function mostrarEncontrado() {
      document.getElementById('zona').innerHTML = `
        <div class="tarjeta-formulario">
        <h2>He encontrado un objeto</h2>
        <p>Introduce el código del objeto y tus datos.</p>

        <input type="text" id="codigo-encontrado" placeholder="Código"><br><br>
        <input type="text" id="nombre-encontrado" placeholder="Tu nombre"><br><br>
        <input type="email" id="contacto-encontrado" placeholder="Tu email"><br><br>
        <textarea id="mensaje-encontrado" placeholder="Mensaje para el propietario"></textarea><br><br>

        <button onclick="comprobarCodigoEncontrado()">Enviar aviso</button>
        </div>
      `;
    }

    async function guardarCodigo() {
      const codigo = document.getElementById('codigo').value;
      const nombre = document.getElementById('nombre').value;
      const contacto = document.getElementById('contacto').value;
      const descripcion = document.getElementById('descripcion').value;

      const { data: existente, error: errorConsulta } = await supabaseClient
        .from('items')
        .select('*')
        .eq('code', codigo);

if (errorConsulta) {
  mostrarMensaje('Error al comprobar el código: ' + errorConsulta.message, 'error');
  return;
}

if (existente && existente.length > 0) {
  mostrarMensaje('Este código ya está registrado', 'error');
  return;
}

      const { error } = await supabaseClient
        .from('items')
        .insert([
          {
            code: codigo,
            owner_name: nombre,
            contact_info: contacto,
            description: descripcion
          }
        ]);

if (error) {
  mostrarMensaje('Error: ' + error.message, 'error');
} else {
  mostrarMensaje('Guardado correctamente', 'ok');
}
    }

    async function comprobarCodigoEncontrado() {
      const codigo = document.getElementById('codigo-encontrado').value;
      const nombre = document.getElementById('nombre-encontrado').value;
      const contacto = document.getElementById('contacto-encontrado').value;
      const mensaje = document.getElementById('mensaje-encontrado').value;

const { data, error } = await supabaseClient
  .from('items')
  .select('*')
  .eq('code', codigo);

const propietario = data && data.length > 0 ? data[0] : null;

if (error) {
  mostrarMensaje('Error: ' + error.message, 'error');
  return;
}

if (!data || data.length === 0) {
  mostrarMensaje('Este código no está registrado', 'error');
  return;
}

      const { error: errorGuardar } = await supabaseClient
        .from('found_reports')
        .insert([
          {
            code: codigo,
            finder_name: nombre,
            finder_contact: contacto,
            message: mensaje
          }
        ]);

if (errorGuardar) {
  mostrarMensaje('Error al guardar el aviso: ' + errorGuardar.message, 'error');
  return;
}

const respuestaEmail = await fetch('/api/send-email', {
  method: 'POST',
  headers: {
    'Content-Type': 'application/json'
  },
  body: JSON.stringify({
    to: propietario.contact_info,
    subject: 'Han encontrado tu objeto',
    text: `Hola ${propietario.owner_name || ''}, alguien ha encontrado el objeto con código ${codigo}.\n\nDatos de contacto:\n${nombre}\n${contacto}\n\nMensaje:\n${mensaje}`
  })
});

const resultadoEmail = await respuestaEmail.json();

if (!respuestaEmail.ok) {
  mostrarMensaje('Aviso guardado, pero no se ha podido enviar el email. Por favor, contacta con avisos@perdilost.com', 'error');
  return;
}

mostrarMensaje('Aviso guardado y email enviado correctamente', 'ok');
    }
  </script>
</div>
</body>
</html>
